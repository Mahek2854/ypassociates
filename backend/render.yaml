services:
  - type: web
    name: ypassociates-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ypassociates-db
          property: connectionString
      - key: ADMIN_SECRET_TOKEN
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://www.ypassociates.in,https://ypassociates.in
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_RECIPIENT
        sync: false

databases:
  - name: ypassociates-db
    plan: free
